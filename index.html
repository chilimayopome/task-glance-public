<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080a14">
  <title>Task Glance</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero card-glow">
      <p class="eyebrow">Public Preview</p>
      <h1>Task Glance</h1>
      <p class="hero-sub" id="subtitle">今日の重点タスクを見るミニダッシュボード</p>
      <div class="hero-grid">
        <section class="today-card">
          <span class="label">今日の一手</span>
          <h2 id="today-title">Loading...</h2>
          <p id="today-desc">data.jsonを読み込み中です。</p>
          <div class="today-meta">
            <span class="pill" id="today-project">PJ</span>
            <span class="pill ready" id="today-status">READY</span>
          </div>
        </section>
        <section class="metric-card">
          <span class="label">全体進捗</span>
          <div class="ring" id="overall-ring" style="--value:0"><span id="overall-progress">0%</span></div>
          <p id="overall-meta">Loading...</p>
        </section>
      </div>
    </header>

    <section class="section-block" id="projects-section">
      <div class="section-head">
        <p class="eyebrow">Projects</p>
        <h2>公開用プロジェクト</h2>
      </div>
      <div class="stack" id="project-list">Loading...</div>
    </section>

    <section class="section-block" id="roadmap-section">
      <div class="section-head">
        <p class="eyebrow">Roadmap</p>
        <h2>次に向かう方向</h2>
      </div>
      <div class="goal-grid" id="roadmap">Loading...</div>
    </section>

    <section class="section-block" id="timeline-section">
      <div class="section-head">
        <p class="eyebrow">Timeline</p>
        <h2>Gantt風タイムライン</h2>
      </div>
      <div class="stack" id="timeline">Loading...</div>
    </section>

    <footer class="footer-note">
      <p>公開用に抽象化したデータだけを表示しています。外部公開設定はまだ行っていません。</p>
      <p>Updated: <span id="updated">-</span></p>
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
